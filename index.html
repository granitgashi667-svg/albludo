<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUDO ALB KING | Loja Shqiptare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { font-family: 'Inter', sans-serif; background: #0a0f1c; overflow: hidden; color: #f0f3fa; }
        #loading-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: radial-gradient(circle at 30% 10%, #121a2a, #05090f);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
            transition: opacity 0.6s;
        }
        .loading-title { font-size: 3.4rem; font-weight: 800; background: linear-gradient(135deg, #F9D423, #FF4E50); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 2px; }
        .loading-spinner { width: 55px; height:55px; border:4px solid rgba(255,215,0,0.3); border-top-color: #F9D423; border-radius: 50%; animation: spin 0.9s linear infinite; margin-top: 25px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #menu-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: radial-gradient(ellipse at 20% 40%, #141e30, #02040c);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200;
            backdrop-filter: blur(3px);
        }
        .menu-title { font-size: 5.2rem; font-weight: 800; background: linear-gradient(135deg, #FFD966, #FF884D); -webkit-background-clip: text; background-clip: text; color: transparent; text-shadow: 0 0 25px rgba(255,200,50,0.4); letter-spacing: 4px; margin-bottom: 8px; }
        .menu-subtitle { font-size: 1.1rem; color: #b9d0f0; margin-bottom: 48px; letter-spacing: 1px; }
        .menu-buttons { display: flex; flex-direction: column; gap: 16px; width: 300px; }
        .menu-btn { padding: 14px 0; font-size: 1.1rem; font-weight: 600; border: none; border-radius: 60px; cursor: pointer; transition: 0.2s; font-family: 'Inter', sans-serif; background: rgba(255,255,245,0.1); backdrop-filter: blur(8px); color: white; border: 1px solid rgba(255,215,0,0.5); }
        .menu-btn.primary { background: linear-gradient(95deg, #F9D423, #FF884D); color: #0f1a24; border: none; box-shadow: 0 6px 18px rgba(249,212,35,0.4); }
        .menu-btn.primary:hover { transform: translateY(-3px); box-shadow: 0 12px 26px rgba(249,212,35,0.6); }
        .menu-btn.secondary:hover { background: rgba(255,255,245,0.2); transform: translateY(-2px); }
        #name-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: radial-gradient(circle at center, #18263b, #050b12);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200;
        }
        .name-card { background: rgba(10,20,35,0.7); backdrop-filter: blur(16px); border-radius: 48px; padding: 32px 28px; width: 90%; max-width: 400px; border: 1px solid rgba(255,215,0,0.3); }
        .name-input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .name-input-label { font-size: 0.85rem; font-weight: 500; color: #FFD966; letter-spacing: 1px; }
        .name-input { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,215,0,0.4); border-radius: 40px; padding: 14px 20px; font-size: 1rem; color: white; font-family: 'Inter', sans-serif; outline: none; }
        .name-input:focus { border-color: #F9D423; box-shadow: 0 0 8px rgba(249,212,35,0.4); }
        .difficulty-selector { display: flex; gap: 12px; justify-content: center; margin: 25px 0 15px; flex-wrap: wrap; }
        .difficulty-btn { background: transparent; border: 1px solid rgba(255,215,0,0.6); padding: 8px 18px; border-radius: 40px; color: white; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .difficulty-btn.selected { background: #F9D423; color: #0f1a24; border-color: #F9D423; }
        .back-menu-btn { background: transparent; border: none; color: #ccc; margin-top: 20px; cursor: pointer; font-size: 0.9rem; }
        #game-ui { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 50; display: none; }
        #game-ui.show { display: block; }
        .player-panel { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.65); backdrop-filter: blur(12px); border-radius: 32px; padding: 12px 24px; pointer-events: auto; border-left: 4px solid #FFD966; }
        .current-player { display: flex; align-items: center; gap: 12px; }
        .player-color-dot { width: 24px; height:24px; border-radius: 50%; }
        .player-name { font-weight: 700; font-size: 1.2rem; }
        .turn-status { font-size: 0.75rem; opacity: 0.8; }
        .dice-panel { position: absolute; bottom: 25px; right: 25px; background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); border-radius: 60px; padding: 16px 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; pointer-events: auto; }
        .dice-container { display: flex; gap: 15px; }
        .dice-display { width: 70px; height: 70px; background: #fef7e0; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 800; color: #1e2a2e; box-shadow: 0 6px 14px black; cursor: pointer; transition: 0.1s; }
        .roll-btn { background: linear-gradient(95deg, #F9D423, #FF884D); border: none; padding: 12px 28px; border-radius: 40px; font-weight: 700; font-size: 1rem; color: #1a1f2c; cursor: pointer; font-family: 'Inter', sans-serif; }
        .chat-container { position: absolute; bottom: 20px; left: 20px; width: 280px; background: rgba(0,0,0,0.7); backdrop-filter: blur(16px); border-radius: 28px; padding: 12px; pointer-events: auto; border: 1px solid rgba(255,215,0,0.4); }
        .chat-messages { height: 140px; overflow-y: auto; font-size: 0.75rem; padding: 5px; display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
        .chat-messages div { background: rgba(255,255,245,0.1); padding: 6px 10px; border-radius: 20px; word-break: break-word; }
        .chat-input-area { display: flex; gap: 8px; }
        .chat-input { flex: 1; background: rgba(0,0,0,0.6); border: 1px solid #FFD966; border-radius: 30px; padding: 8px 12px; color: white; font-size: 0.8rem; outline: none; }
        .chat-send { background: #FFD966; border: none; border-radius: 30px; padding: 0 15px; font-weight: bold; cursor: pointer; color:#0f1a24; }
        .tools { position: absolute; top: 20px; right: 20px; display: flex; gap: 12px; pointer-events: auto; }
        .icon-btn { background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); width: 44px; height: 44px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; cursor: pointer; border: 1px solid rgba(255,215,0,0.5); }
        #win-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); display: none; align-items: center; justify-content: center; z-index: 400; flex-direction: column; }
        .win-card { background: linear-gradient(145deg, #1e2a3a, #0a121c); padding: 40px; border-radius: 60px; text-align: center; border: 2px solid #FFD966; }
        @media (max-width: 700px) { .menu-title { font-size: 3rem; } .dice-display { width: 55px; height:55px; font-size:1.8rem; } .chat-container { width: 240px; bottom: 10px; left: 10px; } .tools { top: 10px; right: 10px; } .icon-btn { width: 38px; height: 38px; font-size:1.2rem; } }
    </style>
</head>
<body>

<div id="loading-screen"><div class="loading-title">LUDO ALB KING</div><div class="loading-spinner"></div></div>

<div id="menu-screen">
    <div class="menu-title">LUDO ALB KING</div>
    <div class="menu-subtitle">Loja jonë, krenaria shqiptare</div>
    <div class="menu-buttons">
        <button class="menu-btn primary" id="resumeBtn" style="display:none;">Vazhdo lojën</button>
        <button class="menu-btn primary" onclick="selectMode('single')">🤖 Kundër AI</button>
        <button class="menu-btn primary" onclick="selectMode('2p')">👥 2 Lojtarë</button>
        <button class="menu-btn primary" onclick="selectMode('4p')">👥👥 4 Lojtarë</button>
        <button class="menu-btn secondary" onclick="showHelp()">📖 Mëso si të luash</button>
    </div>
</div>

<div id="name-screen" style="display:none;">
    <div class="name-card">
        <h3 style="text-align:center; margin-bottom:20px;">Vendosni emrat</h3>
        <div id="name-inputs-container"></div>
        <div id="difficultySelector" style="display:none;" class="difficulty-selector">
            <button class="difficulty-btn" data-diff="easy">Lehtë</button>
            <button class="difficulty-btn selected" data-diff="normal">Mesatare</button>
            <button class="difficulty-btn" data-diff="hard">E Vështirë</button>
        </div>
        <div class="difficulty-selector">
            <button class="difficulty-btn" data-dice="single">🎲 Një Zar</button>
            <button class="difficulty-btn selected" data-dice="double">🎲🎲 Dy Zare</button>
        </div>
        <div style="display:flex; justify-content:center; gap:20px; margin-top:25px;">
            <button class="menu-btn secondary" style="padding:8px 20px;" onclick="backToMenu()">Kthehu</button>
            <button class="menu-btn primary" style="padding:8px 20px;" onclick="startGameWithNames()">Fillo Lojën</button>
        </div>
    </div>
</div>

<div id="game-ui">
    <div class="player-panel"><div class="current-player"><div class="player-color-dot" id="playerDot"></div><span class="player-name" id="playerName">RED</span></div><div class="turn-status" id="turnStatus">Rrotulloni zarin...</div></div>
    <div class="tools"><div class="icon-btn" onclick="toggleSound()">🔊</div><div class="icon-btn" onclick="saveAndQuit()">💾</div><div class="icon-btn" onclick="goHome()">🏠</div></div>
    <div class="chat-container"><div class="chat-messages" id="chatMessages"></div><div class="chat-input-area"><input type="text" id="chatInput" class="chat-input" placeholder="Shkruani mesazhin..."><button class="chat-send" onclick="sendChatMessage()">Dërgo</button></div></div>
    <div class="dice-panel"><div class="dice-container"><div class="dice-display" id="dice1" onclick="selectDice(0)">?</div><div class="dice-display" id="dice2" onclick="selectDice(1)">?</div></div><button class="roll-btn" id="rollBtn" onclick="rollDice()">Rrotullo</button></div>
</div>

<div id="win-screen"><div class="win-card"><h1 style="font-size:2.5rem;">🏆 FITUESI 🏆</h1><p id="winnerName" style="font-size:2rem; margin:20px 0; color:#FFD966;"></p><button class="menu-btn primary" onclick="restartGame()">Luaj përsëri</button></div></div>

<div id="game-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
// ----------------------------------------------------------------------
// KODI I PLOTE I LOJES LUDO 3D (versioni origjinal i punes, i adaptuar ne shqip)
// ----------------------------------------------------------------------
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ KONSTANTAT =============
const COLORS = { RED: 0xE53935, GREEN: 0x43A047, YELLOW: 0xFDD835, BLUE: 0x1E88E5, WHITE: 0xFFFFFF, CREAM: 0xF5F5DC, BOARD_BROWN: 0x8B4513 };
const PLAYER_NAMES = ['RED', 'GREEN', 'YELLOW', 'BLUE'];
const PLAYER_COLORS = [COLORS.RED, COLORS.GREEN, COLORS.YELLOW, COLORS.BLUE];
const CELL = 1.2; const BOARD_SIZE = 15;

// ============ AUDIO ENGINE ============
class AudioEngine {
    constructor() { this.ctx = null; this.enabled = true; }
    init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === 'suspended') this.ctx.resume(); }
    playTone(freq, type, dur) { if (!this.enabled || !this.ctx) return; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.type = type; osc.frequency.value = freq; gain.gain.setValueAtTime(0.3, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur); osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + dur); }
    playRoll() { this.init(); for (let i=0;i<8;i++) setTimeout(()=>this.playTone(600+Math.random()*200,'square',0.05), i*60); }
    playMove() { this.init(); this.playTone(400,'sine',0.1); setTimeout(()=>this.playTone(600,'sine',0.1),100); }
    playCapture() { this.init(); this.playTone(200,'sawtooth',0.2); this.playTone(100,'square',0.3); }
    playWin() { this.init(); [523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.playTone(f,'triangle',0.3),i*150)); }
    toggle() { this.enabled = !this.enabled; return this.enabled; }
}
const audio = new AudioEngine();

// ============ THREE.JS SETUP ============
const container = document.getElementById('game-container');
const scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
const isMobile = window.innerWidth < 768;
camera.position.set(0, isMobile ? 32 : 25, isMobile ? 32 : 25);
camera.lookAt(0,0,0);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.05; controls.maxPolarAngle = Math.PI/2.3; controls.minDistance=15; controls.maxDistance=50;

// Ndriçimi
const ambient = new THREE.AmbientLight(0xffffff,1.0); scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff,1.2); dirLight.position.set(15,30,15); dirLight.castShadow=true; scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0xffffff,0.5); fillLight.position.set(-15,20,-15); scene.add(fillLight);

// ============ BOARD CONSTRUCTION ============
const boardGroup = new THREE.Group(); scene.add(boardGroup);
const piecesGroup = new THREE.Group(); scene.add(piecesGroup);
const materials = {
    cream: new THREE.MeshStandardMaterial({ color: COLORS.CREAM, roughness:0.8 }),
    white: new THREE.MeshStandardMaterial({ color: COLORS.WHITE, roughness:0.5 }),
    brown: new THREE.MeshStandardMaterial({ color: COLORS.BOARD_BROWN, roughness:0.7 }),
    red: new THREE.MeshStandardMaterial({ color: COLORS.RED, roughness:0.4 }),
    green: new THREE.MeshStandardMaterial({ color: COLORS.GREEN, roughness:0.4 }),
    yellow: new THREE.MeshStandardMaterial({ color: COLORS.YELLOW, roughness:0.4 }),
    blue: new THREE.MeshStandardMaterial({ color: COLORS.BLUE, roughness:0.4 }),
};
function getWorldPos(col,row){ return { x: (col-7)*CELL, z: (row-7)*CELL }; }

// Path coordinates (same as original)
const PATH_COORDS = [
    {c:1,r:6},{c:2,r:6},{c:3,r:6},{c:4,r:6},{c:5,r:6},
    {c:6,r:5},{c:6,r:4},{c:6,r:3},{c:6,r:2},{c:6,r:1},{c:6,r:0},
    {c:7,r:0},{c:8,r:0},{c:8,r:1},{c:8,r:2},{c:8,r:3},{c:8,r:4},{c:8,r:5},
    {c:9,r:6},{c:10,r:6},{c:11,r:6},{c:12,r:6},{c:13,r:6},{c:14,r:6},
    {c:14,r:7},{c:14,r:8},{c:13,r:8},{c:12,r:8},{c:11,r:8},{c:10,r:8},{c:9,r:8},
    {c:8,r:9},{c:8,r:10},{c:8,r:11},{c:8,r:12},{c:8,r:13},{c:8,r:14},
    {c:7,r:14},{c:6,r:14},{c:6,r:13},{c:6,r:12},{c:6,r:11},{c:6,r:10},{c:6,r:9},
    {c:5,r:8},{c:4,r:8},{c:3,r:8},{c:2,r:8},{c:1,r:8},{c:0,r:8},{c:0,r:7}
];
const SAFE_SQUARES = [0,8,13,21,26,34,39,47];
const HOME_COLUMNS = {
    RED: [{c:1,r:7},{c:2,r:7},{c:3,r:7},{c:4,r:7},{c:5,r:7},{c:6,r:7}],
    GREEN: [{c:7,r:1},{c:7,r:2},{c:7,r:3},{c:7,r:4},{c:7,r:5},{c:7,r:6}],
    YELLOW: [{c:13,r:7},{c:12,r:7},{c:11,r:7},{c:10,r:7},{c:9,r:7},{c:8,r:7}],
    BLUE: [{c:7,r:13},{c:7,r:12},{c:7,r:11},{c:7,r:10},{c:7,r:9},{c:7,r:8}]
};
const START_POSITIONS = { RED:0, GREEN:13, YELLOW:26, BLUE:39 };

function createBoard(){
    const baseGeo = new THREE.BoxGeometry(BOARD_SIZE*CELL+2,0.5,BOARD_SIZE*CELL+2);
    const base = new THREE.Mesh(baseGeo, materials.cream); base.position.y=-0.25; base.receiveShadow=true; boardGroup.add(base);
    const borderGeo = new THREE.BoxGeometry(BOARD_SIZE*CELL+3,0.6,BOARD_SIZE*CELL+3);
    const border = new THREE.Mesh(borderGeo, materials.brown); border.position.y=-0.35; boardGroup.add(border);
    // create home bases (simplified)
    const offsets = [{startCol:0,startRow:0,color:COLORS.RED,name:'RED'},{startCol:9,startRow:0,color:COLORS.GREEN,name:'GREEN'},{startCol:9,startRow:9,color:COLORS.YELLOW,name:'YELLOW'},{startCol:0,startRow:9,color:COLORS.BLUE,name:'BLUE'}];
    offsets.forEach(o=>{
        const centerX = (o.startCol+3-7.5)*CELL; const centerZ = (o.startRow+3-7.5)*CELL;
        const plate = new THREE.Mesh(new THREE.BoxGeometry(6*CELL-0.2,0.15,6*CELL-0.2), new THREE.MeshStandardMaterial({color:o.color,roughness:0.5}));
        plate.position.set(centerX,0.08,centerZ); boardGroup.add(plate);
    });
    PATH_COORDS.forEach((coord,idx)=>{
        const pos = getWorldPos(coord.c,coord.r);
        let cellMat = materials.white;
        if(idx===START_POSITIONS.RED) cellMat=materials.red;
        else if(idx===START_POSITIONS.GREEN) cellMat=materials.green;
        else if(idx===START_POSITIONS.YELLOW) cellMat=materials.yellow;
        else if(idx===START_POSITIONS.BLUE) cellMat=materials.blue;
        const cell = new THREE.Mesh(new THREE.BoxGeometry(CELL*0.9,0.1,CELL*0.9), cellMat);
        cell.position.set(pos.x,0.05,pos.z); cell.receiveShadow=true; boardGroup.add(cell);
        if(SAFE_SQUARES.includes(idx)){
            const star = new THREE.Mesh(new THREE.ConeGeometry(0.2,0.15,5), new THREE.MeshStandardMaterial({color:0xFFD700,metalness:0.5}));
            star.position.set(pos.x,0.15,pos.z); boardGroup.add(star);
        }
    });
    Object.entries(HOME_COLUMNS).forEach(([color,coords])=>{
        const mat = materials[color.toLowerCase()];
        coords.forEach(coord=>{
            const pos = getWorldPos(coord.c,coord.r);
            const cell = new THREE.Mesh(new THREE.BoxGeometry(CELL*0.9,0.1,CELL*0.9), mat);
            cell.position.set(pos.x,0.05,pos.z); boardGroup.add(cell);
        });
    });
}
createBoard();

// ============ PIECE CLASS ============
class Piece {
    constructor(color, colorName, id, homePos){
        this.color=color; this.colorName=colorName; this.id=id; this.homePos={...homePos, y:0.5};
        this.pathIndex=-1; this.homeColumnIndex=-1; this.finished=false;
        this.mesh = this.createMesh();
        this.mesh.position.set(homePos.x,0.5,homePos.z);
        this.mesh.userData = {owner:this};
        piecesGroup.add(this.mesh);
    }
    createMesh(){
        const group = new THREE.Group();
        const cone = new THREE.Mesh(new THREE.ConeGeometry(0.35,0.8,16), new THREE.MeshStandardMaterial({color:this.color,roughness:0.3}));
        cone.position.y=0.4; cone.castShadow=true; group.add(cone);
        const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.25,16,16), new THREE.MeshStandardMaterial({color:this.color,roughness:0.3}));
        sphere.position.y=0.9; sphere.castShadow=true; group.add(sphere);
        return group;
    }
    moveTo(targetPos, onComplete){
        audio.playMove();
        gsap.to(this.mesh.position, {x:targetPos.x, z:targetPos.z, duration:0.4, ease:"power2.out", onComplete});
        gsap.to(this.mesh.position, {y:1.5, duration:0.2, yoyo:true, repeat:1, ease:"power2.out"});
    }
    returnHome(){
        audio.playCapture();
        this.pathIndex=-1; this.homeColumnIndex=-1; this.finished=false; this.mesh.visible=true;
        gsap.to(this.mesh.position, {x:this.homePos.x, y:0.5, z:this.homePos.z, duration:0.5});
    }
    highlight(active){
        if(active){
            gsap.to(this.mesh.position, {y:0.8, duration:0.3, yoyo:true, repeat:-1, ease:"power1.inOut"});
        } else {
            gsap.killTweensOf(this.mesh.position); this.mesh.position.y=0.5;
        }
    }
}

// ============ GAME STATE ============
let selectedMode = null;
const STATE = {
    gameMode:null, difficulty:'normal', diceMode:'double', playerNames:[], controlMapping:{}, aiPlayers:[],
    players:[], currentPlayerIndex:0, diceValues:[null,null], diceUsed:[false,false], selectedDice:null,
    phase:'ROLL', consecutiveDoubleSixes:0, gameStarted:false, capturedThisTurn:false, aiIsPlaying:false
};

function initPlayers(){
    const markerOffset = CELL*1.2;
    const centers = [
        {x:(0+3-7.5)*CELL, z:(0+3-7.5)*CELL}, // RED
        {x:(9+3-7.5)*CELL, z:(0+3-7.5)*CELL}, // GREEN
        {x:(9+3-7.5)*CELL, z:(9+3-7.5)*CELL}, // YELLOW
        {x:(0+3-7.5)*CELL, z:(9+3-7.5)*CELL}  // BLUE
    ];
    const homePositions = centers.map(center => [
        {x:center.x-markerOffset, z:center.z-markerOffset},
        {x:center.x+markerOffset, z:center.z-markerOffset},
        {x:center.x-markerOffset, z:center.z+markerOffset},
        {x:center.x+markerOffset, z:center.z+markerOffset}
    ]);
    PLAYER_NAMES.forEach((name, idx)=>{
        const player = { name, color:PLAYER_COLORS[idx], pieces:[], finishedCount:0 };
        for(let i=0;i<4;i++) player.pieces.push(new Piece(PLAYER_COLORS[idx], name, i, homePositions[idx][i]));
        STATE.players.push(player);
    });
}

function getValidMovesForDice(diceVal){
    if(!diceVal) return [];
    const controlled = STATE.controlMapping[STATE.currentPlayerIndex];
    if(!controlled) return [];
    let valid = [];
    controlled.forEach(colorIdx=>{
        const player = STATE.players[colorIdx];
        const pName = PLAYER_NAMES[colorIdx];
        const start = START_POSITIONS[pName];
        player.pieces.forEach(piece=>{
            if(piece.finished) return;
            if(piece.pathIndex===-1 && diceVal===6) valid.push(piece);
            else if(piece.homeColumnIndex>=0 && piece.homeColumnIndex+diceVal<=5) valid.push(piece);
            else if(piece.pathIndex>=0 && piece.homeColumnIndex===-1){
                const rel = (piece.pathIndex - start + 52)%52;
                const newRel = rel + diceVal;
                if(newRel>=51){
                    const step = newRel-51;
                    if(step<=6) valid.push(piece);
                } else valid.push(piece);
            }
        });
    });
    return valid;
}

function getValidMovesForAnyDice(){
    const m1 = STATE.diceUsed[0]?[]:getValidMovesForDice(STATE.diceValues[0]);
    const m2 = STATE.diceUsed[1]?[]:getValidMovesForDice(STATE.diceValues[1]);
    return [...new Set([...m1,...m2])];
}

function afterMove(){
    if(STATE.aiIsPlaying){ if(STATE.gameStarted) saveGame(); return; }
    if(STATE.selectedDice!==null){
        STATE.diceUsed[STATE.selectedDice]=true;
        document.getElementById(`dice${STATE.selectedDice+1}`).classList.add('used');
    }
    STATE.selectedDice=null;
    if(STATE.gameStarted) saveGame();
    const remaining = getValidMovesForAnyDice();
    if(remaining.length>0){
        STATE.phase='SELECT_DICE';
        highlightSelectableDice();
        document.getElementById('turnStatus').innerText = 'Përdorni zarin tjetër - klikoni';
    } else endTurn();
}

function endTurn(){
    STATE.players.forEach(p=>p.pieces.forEach(pc=>pc.highlight(false)));
    const singleSix = (STATE.diceMode==='single' && STATE.diceValues[0]===6);
    const doubleSix = (STATE.diceMode!=='single' && STATE.diceValues[0]===6 && STATE.diceValues[1]===6);
    const captured = STATE.capturedThisTurn;
    const shouldContinue = (doubleSix && STATE.consecutiveDoubleSixes<3) || singleSix || captured;
    STATE.capturedThisTurn=false;
    if(shouldContinue){
        logMessage(captured?"Rradhë bonus për kapje!":"Rrota shtesë! (6)");
        if(STATE.aiPlayers.includes(STATE.currentPlayerIndex)){
            STATE.diceValues=[null,null]; STATE.diceUsed=[false,false];
            setTimeout(()=>aiTakeTurn(),1000);
            return;
        }
    } else {
        STATE.consecutiveDoubleSixes=0;
        advanceToNextPlayer();
    }
    STATE.diceValues=[null,null]; STATE.diceUsed=[false,false]; STATE.phase='ROLL';
    document.getElementById('rollBtn').disabled=false;
    document.getElementById('dice1').textContent='?'; document.getElementById('dice2').textContent='?';
    document.getElementById('dice1').classList.remove('used','selectable'); document.getElementById('dice2').classList.remove('used','selectable');
    updateUI();
    if(STATE.aiPlayers.includes(STATE.currentPlayerIndex) && !STATE.aiIsPlaying){
        STATE.aiIsPlaying=true; setTimeout(()=>aiTakeTurn(),1000);
    }
}
function advanceToNextPlayer(){
    if(STATE.gameMode==='single' || STATE.gameMode==='2p') STATE.currentPlayerIndex = STATE.currentPlayerIndex===0?1:0;
    else STATE.currentPlayerIndex = (STATE.currentPlayerIndex+1)%4;
    STATE.aiIsPlaying=false;
}
function highlightSelectableDice(){
    const d1=document.getElementById('dice1'), d2=document.getElementById('dice2');
    const can1 = !STATE.diceUsed[0] && getValidMovesForDice(STATE.diceValues[0]).length>0;
    const can2 = !STATE.diceUsed[1] && getValidMovesForDice(STATE.diceValues[1]).length>0;
    d1.classList.toggle('selectable', can1); d2.classList.toggle('selectable', can2);
    if(can1 && !can2) selectDice(0);
    else if(can2 && !can1) selectDice(1);
}
window.selectDice = function(idx){
    if(STATE.phase!=='SELECT_DICE' && STATE.phase!=='MOVE') return;
    if(STATE.diceUsed[idx]) return;
    if(getValidMovesForDice(STATE.diceValues[idx]).length===0) return;
    STATE.selectedDice=idx; STATE.phase='MOVE';
    document.getElementById('dice1').classList.toggle('selectable', idx===0);
    document.getElementById('dice2').classList.toggle('selectable', idx===1);
    const valid = getValidMovesForDice(STATE.diceValues[idx]);
    STATE.players.forEach(p=>p.pieces.forEach(pp=>pp.highlight(false)));
    valid.forEach(p=>p.highlight(true));
    document.getElementById('turnStatus').innerText = `Zari ${idx+1} (${STATE.diceValues[idx]}) - Zgjidhni pjesën`;
};
async function rollDice(){
    if(STATE.phase!=='ROLL') return;
    audio.playRoll();
    STATE.phase='WAITING'; document.getElementById('rollBtn').disabled=true;
    STATE.diceUsed=[false,false]; STATE.selectedDice=null; STATE.capturedThisTurn=false;
    let rolls=0; const dice1=document.getElementById('dice1'), dice2=document.getElementById('dice2');
    dice1.classList.add('rolling'); dice2.classList.add('rolling');
    const interval = setInterval(()=>{
        dice1.textContent = Math.floor(Math.random()*6)+1;
        dice2.textContent = Math.floor(Math.random()*6)+1;
        rolls++;
        if(rolls>12){
            clearInterval(interval);
            dice1.classList.remove('rolling'); dice2.classList.remove('rolling');
            finalizeDice();
        }
    },60);
}
function finalizeDice(){
    const val1 = Math.floor(Math.random()*6)+1;
    const isSingle = STATE.diceMode==='single';
    const val2 = isSingle ? null : Math.floor(Math.random()*6)+1;
    STATE.diceValues = [val1, val2];
    document.getElementById('dice1').textContent = val1;
    if(isSingle){
        document.getElementById('dice2').textContent = '-';
        document.getElementById('dice2').classList.add('used');
        STATE.diceUsed[1]=true;
        logMessage(`Rrotulluat ${val1}`);
    } else {
        document.getElementById('dice2').textContent = val2;
        logMessage(`Rrotulluat ${val1} dhe ${val2}`);
    }
    if(!isSingle && val1===6 && val2===6){
        STATE.consecutiveDoubleSixes++;
        if(STATE.consecutiveDoubleSixes>=3){
            logMessage("Tre herë 6-6! Humb rradhën.");
            STATE.consecutiveDoubleSixes=0;
            setTimeout(()=>endTurn(),1000);
            return;
        }
        logMessage("Dy 6! Rradhë bonus.");
    } else if(isSingle && val1===6) logMessage("Rrota 6! Rradhë bonus.");
    else STATE.consecutiveDoubleSixes=0;
    const valid = getValidMovesForAnyDice();
    if(valid.length===0){
        logMessage("Asnjë lëvizje e mundshme.");
        setTimeout(()=>endTurn(),1000);
    } else {
        STATE.phase='SELECT_DICE';
        highlightSelectableDice();
        document.getElementById('turnStatus').innerText = 'Klikoni mbi zarin, pastaj mbi pjesën';
    }
}
async function aiTakeTurn(){
    STATE.aiIsPlaying=true; STATE.phase='AI_TURN';
    document.getElementById('turnStatus').innerText = '🤖 AI po mendon...';
    document.getElementById('rollBtn').disabled=true;
    await new Promise(r=>setTimeout(r,800+Math.random()*400));
    STATE.diceUsed=[false,false]; STATE.selectedDice=null; STATE.capturedThisTurn=false;
    audio.playRoll();
    await new Promise(r=>{ let rolls=0; const d1=document.getElementById('dice1'),d2=document.getElementById('dice2'); d1.classList.add('rolling'); d2.classList.add('rolling'); const iv=setInterval(()=>{ d1.textContent=Math.floor(Math.random()*6)+1; d2.textContent=Math.floor(Math.random()*6)+1; rolls++; if(rolls>8){ clearInterval(iv); d1.classList.remove('rolling'); d2.classList.remove('rolling'); r(); } },60); });
    const val1=Math.floor(Math.random()*6)+1;
    const isSingle=STATE.diceMode==='single';
    const val2=isSingle?null:Math.floor(Math.random()*6)+1;
    STATE.diceValues=[val1,val2];
    document.getElementById('dice1').textContent=val1;
    if(isSingle){
        document.getElementById('dice2').textContent='-'; document.getElementById('dice2').classList.add('used'); STATE.diceUsed[1]=true;
        logMessage(`AI rrotulloi ${val1}`);
    } else {
        document.getElementById('dice2').textContent=val2;
        logMessage(`AI rrotulloi ${val1} dhe ${val2}`);
        if(val1===6 && val2===6){
            STATE.consecutiveDoubleSixes++;
            if(STATE.consecutiveDoubleSixes>=3){ logMessage("Tre 6! AI humb rradhën."); STATE.consecutiveDoubleSixes=0; await new Promise(r=>setTimeout(r,1000)); endTurn(); return; }
        }
    }
    await new Promise(r=>setTimeout(r,500));
    for(let die=0;die<2;die++){
        if(STATE.diceUsed[die]) continue;
        const val = STATE.diceValues[die];
        let moves = getValidMovesForDice(val);
        if(moves.length){
            STATE.selectedDice=die;
            let best = moves[0];
            // simple AI: prefer capture, then progress
            for(let m of moves){
                if(m.pathIndex===-1 && val===6) { best=m; break; }
            }
            STATE.phase='MOVE';
            STATE.diceUsed[die]=true;
            document.getElementById(`dice${die+1}`).classList.add('used');
            tryMovePiece(best);
            await new Promise(r=>setTimeout(r,800));
        } else {
            STATE.diceUsed[die]=true;
            document.getElementById(`dice${die+1}`).classList.add('used');
        }
    }
    if(getValidMovesForAnyDice().length===0) await new Promise(r=>setTimeout(r,500)); endTurn();
}
function tryMovePiece(piece){
    const diceVal = STATE.selectedDice!==null ? STATE.diceValues[STATE.selectedDice] : null;
    if(!diceVal) return;
    const colorIdx = PLAYER_NAMES.indexOf(piece.colorName);
    const pName = piece.colorName;
    const start = START_POSITIONS[pName];
    const controlled = STATE.controlMapping[STATE.currentPlayerIndex];
    controlled.forEach(c=>STATE.players[c].pieces.forEach(p=>p.highlight(false)));
    if(piece.pathIndex===-1 && diceVal===6){
        piece.pathIndex = start;
        const coord = PATH_COORDS[start];
        const pos = getWorldPos(coord.c,coord.r);
        piece.moveTo(pos, ()=>{ logMessage(`${piece.colorName} hyri në fushë!`); afterMove(); });
    } else if(piece.pathIndex>=0 && piece.homeColumnIndex===-1){
        const rel = (piece.pathIndex - start + 52)%52;
        const newRel = rel + diceVal;
        if(newRel>=51){
            const step = newRel-51;
            if(step<=6){
                piece.homeColumnIndex = step-1;
                piece.pathIndex = -2;
                const coord = HOME_COLUMNS[pName][piece.homeColumnIndex];
                const pos = getWorldPos(coord.c,coord.r);
                piece.moveTo(pos, ()=>{
                    logMessage(`${piece.colorName} hyri në shtëpi!`);
                    if(piece.homeColumnIndex>=5){
                        piece.finished=true;
                        STATE.players[colorIdx].finishedCount++;
                        if(checkWin()) return;
                    }
                    afterMove();
                });
            } else { logMessage("Duhet numri i saktë për të hyrë!"); afterMove(); }
        } else {
            const newIdx = (piece.pathIndex + diceVal)%52;
            piece.pathIndex = newIdx;
            const coord = PATH_COORDS[newIdx];
            const pos = getWorldPos(coord.c,coord.r);
            // capture check
            if(!SAFE_SQUARES.includes(newIdx)){
                for(let i=0;i<STATE.players.length;i++){
                    for(let p of STATE.players[i].pieces){
                        if(p.pathIndex===newIdx && !p.finished && p.colorName!==piece.colorName){
                            p.returnHome(); break;
                        }
                    }
                }
            }
            piece.moveTo(pos, ()=>{ afterMove(); });
        }
    } else if(piece.homeColumnIndex>=0){
        const newHome = piece.homeColumnIndex + diceVal;
        if(newHome<=5){
            piece.homeColumnIndex = newHome;
            const coord = HOME_COLUMNS[pName][piece.homeColumnIndex];
            const pos = getWorldPos(coord.c,coord.r);
            piece.moveTo(pos, ()=>{
                if(piece.homeColumnIndex>=5){
                    piece.finished=true;
                    STATE.players[colorIdx].finishedCount++;
                    if(checkWin()) return;
                }
                afterMove();
            });
        } else { logMessage("Duhet numri i saktë!"); afterMove(); }
    }
}
function checkWin(){
    const controlled = STATE.controlMapping[STATE.currentPlayerIndex];
    let total=0;
    controlled.forEach(c=>total+=STATE.players[c].finishedCount);
    if(total>=4*controlled.length){
        const winner = STATE.playerNames[STATE.currentPlayerIndex];
        document.getElementById('winnerName').innerText = winner;
        document.getElementById('win-screen').style.display='flex';
        audio.playWin();
        localStorage.removeItem('ludo_save');
        return true;
    }
    return false;
}
function updateUI(){
    const pName = STATE.playerNames[STATE.currentPlayerIndex] || 'Lojtar';
    const controlled = STATE.controlMapping[STATE.currentPlayerIndex] || [0];
    const firstColor = STATE.players[controlled[0]];
    document.getElementById('playerName').innerText = pName;
    document.getElementById('playerDot').style.background = firstColor ? `#${firstColor.color.toString(16)}` : '#E53935';
    const status = STATE.phase==='AI_TURN'?'🤖 AI po mendon...':(STATE.phase==='ROLL'?'Rrotulloni zarin...':'Zgjidhni një pjesë...');
    document.getElementById('turnStatus').innerText = status;
    STATE.players.forEach((p,i)=>{
        const fin = p.pieces.filter(pc=>pc.finished).length;
        const el = document.getElementById(`${PLAYER_NAMES[i].toLowerCase()}-count`);
        if(el) el.innerText = `${fin}/4`;
    });
}
function logMessage(msg){
    const chatDiv = document.getElementById('chatMessages');
    const entry = document.createElement('div');
    entry.textContent = `🎲 ${msg}`;
    chatDiv.appendChild(entry);
    chatDiv.scrollTop = chatDiv.scrollHeight;
    while(chatDiv.children.length>20) chatDiv.removeChild(chatDiv.firstChild);
}
window.sendChatMessage = function(){
    const input = document.getElementById('chatInput');
    const txt = input.value.trim();
    if(txt==='') return;
    const name = STATE.playerNames[STATE.currentPlayerIndex] || 'Lojtar';
    const chatDiv = document.getElementById('chatMessages');
    const entry = document.createElement('div');
    entry.textContent = `${name}: ${txt}`;
    chatDiv.appendChild(entry);
    chatDiv.scrollTop = chatDiv.scrollHeight;
    input.value = '';
};
function saveGame(){
    const data = { gameMode:STATE.gameMode, difficulty:STATE.difficulty, diceMode:STATE.diceMode, playerNames:STATE.playerNames, controlMapping:STATE.controlMapping, aiPlayers:STATE.aiPlayers, currentPlayerIndex:STATE.currentPlayerIndex, pieces:[] };
    STATE.players.forEach((p,ci)=>p.pieces.forEach((pc,pi)=>data.pieces.push({colorIndex:ci,pieceId:pi,pathIndex:pc.pathIndex,homeColumnIndex:pc.homeColumnIndex,finished:pc.finished})));
    localStorage.setItem('ludo_save',JSON.stringify(data));
}
window.saveAndQuit = function(){ saveGame(); location.reload(); };
window.goHome = function(){ if(confirm('Kthehu në menunë kryesore? Lojën do ta ruajë.')){ saveGame(); location.reload(); } };
window.restartGame = function(){ location.reload(); };
window.toggleSound = function(){ const on = audio.toggle(); document.querySelector('.tools .icon-btn:first-child').innerText = on?'🔊':'🔇'; };
window.selectMode = function(mode){
    selectedMode=mode;
    const container=document.getElementById('name-inputs-container');
    container.innerHTML='';
    let num = mode==='single'?1:(mode==='2p'?2:4);
    for(let i=0;i<num;i++){
        const grp=document.createElement('div'); grp.className='name-input-group';
        const lab=document.createElement('label'); lab.className='name-input-label'; lab.innerText = mode==='single'?'Emri juaj':`Lojtari ${i+1}`;
        const inp=document.createElement('input'); inp.type='text'; inp.className='name-input'; inp.placeholder=`Lojtari ${i+1}`;
        grp.appendChild(lab); grp.appendChild(inp); container.appendChild(grp);
    }
    document.getElementById('difficultySelector').style.display = mode==='single'?'flex':'none';
    document.getElementById('menu-screen').style.display='none';
    document.getElementById('name-screen').style.display='flex';
};
window.backToMenu = function(){ document.getElementById('name-screen').style.display='none'; document.getElementById('menu-screen').style.display='flex'; selectedMode=null; };
window.startGameWithNames = function(){
    const inputs = document.querySelectorAll('.name-input');
    const names=[];
    inputs.forEach(inp=>{ let n=inp.value.trim(); if(!n) n=inp.placeholder; names.push(n); });
    STATE.playerNames=names; STATE.gameMode=selectedMode;
    if(selectedMode==='single'){
        STATE.controlMapping={0:[0,2],1:[1,3]}; STATE.playerNames[1]='AI'; STATE.aiPlayers=[1];
    } else if(selectedMode==='2p'){
        STATE.controlMapping={0:[0,2],1:[1,3]}; STATE.aiPlayers=[];
    } else {
        STATE.controlMapping={0:[0],1:[1],2:[2],3:[3]}; STATE.aiPlayers=[];
    }
    const diffBtn = document.querySelector('#difficultySelector .difficulty-btn.selected');
    if(diffBtn) STATE.difficulty = diffBtn.getAttribute('data-diff') || 'normal';
    const diceBtn = document.querySelector('#dice-mode-selector .difficulty-btn.selected');
    if(diceBtn) STATE.diceMode = diceBtn.getAttribute('data-dice') || 'double';
    startGame();
};
function startGame(){
    document.getElementById('name-screen').style.display='none';
    document.getElementById('menu-screen').style.display='none';
    document.getElementById('game-ui').classList.add('show');
    if(!STATE.gameStarted){ initPlayers(); STATE.gameStarted=true; }
    const dice2 = document.getElementById('dice2');
    if(STATE.diceMode==='single') dice2.style.display='none'; else dice2.style.display='flex';
    STATE.phase='ROLL'; STATE.diceValues=[null,null]; STATE.diceUsed=[false,false];
    document.getElementById('rollBtn').disabled=false;
    updateUI();
    if(STATE.aiPlayers.includes(STATE.currentPlayerIndex)) setTimeout(()=>aiTakeTurn(),1000);
}
window.showHelp = function(){
    alert("Rregullat e Ludo Alb King:\n- Qëllimi: sillni 4 pjesët në qendër.\n- Për të nisur duhet 6.\n- 6 jep rradhë shtesë.\n- Kapja e kundërshtarit i dërgon pjesët në shtëpi.\n- Sheshet me yll janë të sigurta.");
};
const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2();
renderer.domElement.addEventListener('click',(e)=>{
    if(STATE.phase!=='MOVE') return;
    mouse.x = (e.clientX/renderer.domElement.clientWidth)*2-1;
    mouse.y = -(e.clientY/renderer.domElement.clientHeight)*2+1;
    raycaster.setFromCamera(mouse,camera);
    const intersects = raycaster.intersectObjects(piecesGroup.children,true);
    if(intersects.length){
        let obj = intersects[0].object;
        while(obj.parent && !obj.userData.owner) obj=obj.parent;
        if(obj.userData.owner){
            const piece = obj.userData.owner;
            const controlled = STATE.controlMapping[STATE.currentPlayerIndex];
            const pieceIdx = PLAYER_NAMES.indexOf(piece.colorName);
            if(controlled.includes(pieceIdx)) tryMovePiece(piece);
        }
    }
});
renderer.domElement.addEventListener('touchend',(e)=>{
    e.preventDefault();
    if(e.changedTouches.length && STATE.phase==='MOVE'){
        const touch=e.changedTouches[0];
        mouse.x = (touch.clientX/renderer.domElement.clientWidth)*2-1;
        mouse.y = -(touch.clientY/renderer.domElement.clientHeight)*2+1;
        raycaster.setFromCamera(mouse,camera);
        const intersects = raycaster.intersectObjects(piecesGroup.children,true);
        if(intersects.length){
            let obj = intersects[0].object;
            while(obj.parent && !obj.userData.owner) obj=obj.parent;
            if(obj.userData.owner){
                const piece = obj.userData.owner;
                const controlled = STATE.controlMapping[STATE.currentPlayerIndex];
                const pieceIdx = PLAYER_NAMES.indexOf(piece.colorName);
                if(controlled.includes(pieceIdx)) tryMovePiece(piece);
            }
        }
    }
},{passive:false});
function animate(){ requestAnimationFrame(animate); controls.update(); renderer.render(scene,camera); }
animate();
window.addEventListener('resize',()=>{ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); });
setTimeout(()=>{ document.getElementById('loading-screen').style.display='none'; },1500);
</script>
