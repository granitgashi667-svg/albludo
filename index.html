<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUDO ALB KING | Loja Shqiptare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0f1c;
            overflow: hidden;
            color: #f0f3fa;
        }
        /* loading */
        #loading-screen {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: radial-gradient(circle at 30% 10%, #121a2a, #05090f);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.6s;
        }
        .loading-title {
            font-size: 3.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #F9D423, #FF4E50);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }
        .loading-spinner {
            width: 55px; height:55px;
            border:4px solid rgba(255,215,0,0.3);
            border-top-color: #F9D423;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-top: 25px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* menu kryesore */
        #menu-screen {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: radial-gradient(ellipse at 20% 40%, #141e30, #02040c);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            backdrop-filter: blur(3px);
        }
        .menu-title {
            font-size: 5.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #FF884D);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 25px rgba(255,200,50,0.4);
            letter-spacing: 4px;
            margin-bottom: 8px;
        }
        .menu-subtitle {
            font-size: 1.1rem;
            color: #b9d0f0;
            margin-bottom: 48px;
            letter-spacing: 1px;
        }
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 300px;
        }
        .menu-btn {
            padding: 14px 0;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            background: rgba(255,255,245,0.1);
            backdrop-filter: blur(8px);
            color: white;
            border: 1px solid rgba(255,215,0,0.5);
        }
        .menu-btn.primary {
            background: linear-gradient(95deg, #F9D423, #FF884D);
            color: #0f1a24;
            border: none;
            box-shadow: 0 6px 18px rgba(249,212,35,0.4);
        }
        .menu-btn.primary:hover { transform: translateY(-3px); box-shadow: 0 12px 26px rgba(249,212,35,0.6); }
        .menu-btn.secondary:hover { background: rgba(255,255,245,0.2); transform: translateY(-2px); }

        /* ekrani i emrave */
        #name-screen {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: radial-gradient(circle at center, #18263b, #050b12);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .name-card {
            background: rgba(10,20,35,0.7);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 32px 28px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .name-input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }
        .name-input-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #FFD966;
            letter-spacing: 1px;
        }
        .name-input {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,215,0,0.4);
            border-radius: 40px;
            padding: 14px 20px;
            font-size: 1rem;
            color: white;
            font-family: 'Inter', sans-serif;
            outline: none;
        }
        .name-input:focus { border-color: #F9D423; box-shadow: 0 0 8px rgba(249,212,35,0.4); }
        .difficulty-selector {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 25px 0 15px;
        }
        .difficulty-btn {
            background: transparent;
            border: 1px solid rgba(255,215,0,0.6);
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .difficulty-btn.selected {
            background: #F9D423;
            color: #0f1a24;
            border-color: #F9D423;
        }
        .back-menu-btn {
            background: transparent;
            border: none;
            color: #ccc;
            margin-top: 20px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* UI e lojës */
        #game-ui {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            pointer-events: none;
            z-index: 50;
            display: none;
        }
        #game-ui.show { display: block; }
        .player-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 12px 24px;
            pointer-events: auto;
            border-left: 4px solid #FFD966;
        }
        .current-player {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .player-color-dot {
            width: 24px; height:24px;
            border-radius: 50%;
            background: red;
        }
        .player-name { font-weight: 700; font-size: 1.2rem; }
        .turn-status { font-size: 0.75rem; opacity: 0.8; }

        /* paneli i zarit */
        .dice-panel {
            position: absolute;
            bottom: 25px;
            right: 25px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            pointer-events: auto;
        }
        .dice-container {
            display: flex;
            gap: 15px;
        }
        .dice-display {
            width: 70px;
            height: 70px;
            background: #fef7e0;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 800;
            color: #1e2a2e;
            box-shadow: 0 6px 14px black;
            cursor: pointer;
        }
        .roll-btn {
            background: linear-gradient(95deg, #F9D423, #FF884D);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            color: #1a1f2c;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        /* chat */
        .chat-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 280px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 12px;
            pointer-events: auto;
            border: 1px solid rgba(255,215,0,0.4);
        }
        .chat-messages {
            height: 140px;
            overflow-y: auto;
            font-size: 0.75rem;
            padding: 5px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 8px;
        }
        .chat-messages div {
            background: rgba(255,255,245,0.1);
            padding: 6px 10px;
            border-radius: 20px;
            word-break: break-word;
        }
        .chat-input-area {
            display: flex;
            gap: 8px;
        }
        .chat-input {
            flex: 1;
            background: rgba(0,0,0,0.6);
            border: 1px solid #FFD966;
            border-radius: 30px;
            padding: 8px 12px;
            color: white;
            font-size: 0.8rem;
            outline: none;
        }
        .chat-send {
            background: #FFD966;
            border: none;
            border-radius: 30px;
            padding: 0 15px;
            font-weight: bold;
            cursor: pointer;
        }

        /* butonat e veglave */
        .tools {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }
        .icon-btn {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            cursor: pointer;
            border: 1px solid rgba(255,215,0,0.5);
        }

        /* dritarja fitues */
        #win-screen {
            position: fixed;
            top:0;left:0;width:100%;height:100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 400;
            flex-direction: column;
        }
        .win-card {
            background: linear-gradient(145deg, #1e2a3a, #0a121c);
            padding: 40px;
            border-radius: 60px;
            text-align: center;
            border: 2px solid #FFD966;
        }

        @media (max-width: 700px) {
            .menu-title { font-size: 3rem; }
            .dice-display { width: 55px; height:55px; font-size:1.8rem; }
            .chat-container { width: 240px; bottom: 10px; left: 10px; }
        }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loading-title">LUDO ALB KING</div>
    <div class="loading-spinner"></div>
</div>

<div id="menu-screen">
    <div class="menu-title">LUDO ALB KING</div>
    <div class="menu-subtitle">Loja jonë, krenaria shqiptare</div>
    <div class="menu-buttons">
        <button class="menu-btn primary" id="resumeBtn" style="display:none;">Vazhdo lojën</button>
        <button class="menu-btn primary" onclick="selectMode('single')">🤖 Kundër AI</button>
        <button class="menu-btn primary" onclick="selectMode('2p')">👥 2 Lojtarë</button>
        <button class="menu-btn primary" onclick="selectMode('4p')">👥👥 4 Lojtarë</button>
        <button class="menu-btn secondary" onclick="showHelp()">📖 Mëso si të luash</button>
    </div>
</div>

<div id="name-screen" style="display:none;">
    <div class="name-card">
        <h3 style="text-align:center; margin-bottom:20px;">Vendosni emrat</h3>
        <div id="name-inputs-container"></div>
        <div id="difficultySelector" style="display:none;" class="difficulty-selector">
            <button class="difficulty-btn" data-diff="easy">Lehtë</button>
            <button class="difficulty-btn selected" data-diff="normal">Mesatare</button>
            <button class="difficulty-btn" data-diff="hard">E Vështirë</button>
        </div>
        <div class="difficulty-selector">
            <button class="difficulty-btn" data-dice="single">🎲 Një Zar</button>
            <button class="difficulty-btn selected" data-dice="double">🎲🎲 Dy Zare</button>
        </div>
        <div style="display:flex; justify-content:center; gap:20px; margin-top:25px;">
            <button class="menu-btn secondary" style="padding:8px 20px;" onclick="backToMenu()">Kthehu</button>
            <button class="menu-btn primary" style="padding:8px 20px;" onclick="startGameWithNames()">Fillo Lojën</button>
        </div>
    </div>
</div>

<div id="game-ui">
    <div class="player-panel">
        <div class="current-player">
            <div class="player-color-dot" id="playerDot"></div>
            <span class="player-name" id="playerName">RED</span>
        </div>
        <div class="turn-status" id="turnStatus">Rrotulloni zarin...</div>
    </div>
    <div class="tools">
        <div class="icon-btn" onclick="toggleSound()">🔊</div>
        <div class="icon-btn" onclick="saveAndQuit()">💾</div>
        <div class="icon-btn" onclick="goHome()">🏠</div>
    </div>
    <div class="chat-container">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" class="chat-input" placeholder="Shkruani mesazhin...">
            <button class="chat-send" onclick="sendChatMessage()">Dërgo</button>
        </div>
    </div>
    <div class="dice-panel">
        <div class="dice-container">
            <div class="dice-display" id="dice1" onclick="selectDice(0)">?</div>
            <div class="dice-display" id="dice2" onclick="selectDice(1)">?</div>
        </div>
        <button class="roll-btn" id="rollBtn" onclick="rollDice()">Rrotullo</button>
    </div>
</div>

<div id="win-screen">
    <div class="win-card">
        <h1 style="font-size:2.5rem;">🏆 FITUESI 🏆</h1>
        <p id="winnerName" style="font-size:2rem; margin:20px 0; color:#FFD966;"></p>
        <button class="menu-btn primary" onclick="restartGame()">Luaj përsëri</button>
    </div>
</div>

<div id="game-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

</script>

</body>
</html>
